version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: yt_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - frontend_assets:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - proxy_net
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: yt_frontend
    volumes:
      - frontend_assets:/app/dist
    networks:
      - proxy_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: yt_backend
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://yt_user:yt_password@db:5432/youtube_db
      - REDIS_URL=redis://cache:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
    depends_on:
      - db
      - cache
    networks:
      - proxy_net
      - data_net
    restart: always

  db:
    image: postgres:15-alpine
    container_name: yt_db
    environment:
      - POSTGRES_USER=yt_user
      - POSTGRES_PASSWORD=yt_password
      - POSTGRES_DB=youtube_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yt_user -d youtube_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  cache:
    image: redis:7-alpine
    container_name: yt_cache
    volumes:
      - redis_data:/data
    networks:
      - data_net
    restart: always

networks:
  proxy_net:
    driver: bridge
  data_net:
    internal: true # Security: Block outbound access for DB/Cache
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  frontend_assets:
